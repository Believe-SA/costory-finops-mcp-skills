name: Lint

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json
        run: jq empty .claude-plugin/marketplace.json

      - name: Validate skills.json
        run: jq empty skills.json

      - name: Validate plugin manifests
        run: |
          set -e
          find . -path '*/.claude-plugin/plugin.json' -print0 | while IFS= read -r -d '' manifest; do
            jq empty "$manifest"
          done

      - name: Plugin manifests -- skills must be a string, not an array (Codex requirement)
        run: |
          set -e
          find . -path '*/.claude-plugin/plugin.json' -print0 | while IFS= read -r -d '' manifest; do
            kind=$(jq -r '.skills | type // "null"' "$manifest")
            case "$kind" in
              string|null) ;;
              *)
                echo "::error file=$manifest::skills field is '$kind'; Codex requires a string (e.g. \"./skills/\")"
                exit 1
                ;;
            esac
          done

      - name: Every skill folder has a SKILL.md
        run: |
          set -e
          find plugins/*/skills -mindepth 1 -maxdepth 1 -type d | while read -r dir; do
            [ -f "$dir/SKILL.md" ] || {
              echo "::error file=$dir::missing SKILL.md"
              exit 1
            }
          done

      - name: skills.json paths must exist and versions must lockstep
        run: |
          set -e
          v_market=$(jq -r '.metadata.version' .claude-plugin/marketplace.json)
          v_plugin=$(jq -r '.version' plugins/costory/.claude-plugin/plugin.json)
          v_index=$(jq -r '.version' skills.json)
          [ "$v_market" = "$v_plugin" ] || {
            echo "::error::version mismatch marketplace=$v_market plugin=$v_plugin"
            exit 1
          }
          [ "$v_market" = "$v_index" ] || {
            echo "::error::version mismatch marketplace=$v_market skills.json=$v_index"
            exit 1
          }
          jq -r '.skills[].path' skills.json | while read -r path; do
            [ -f "$path" ] || {
              echo "::error file=skills.json::missing skill file $path"
              exit 1
            }
          done

      - name: Validate recipes index.json
        run: |
          set -e
          index=plugins/costory/skills/recipes/index.json
          jq empty "$index"
          bad=$(jq -r '.[] | select((.id | type != "string" or length == 0)
                                 or (.name | type != "string" or length == 0)
                                 or (.path | type != "string" or length == 0)
                                 or (.category | type != "string" or length == 0))
                       | .id // "unknown"' "$index")
          if [ -n "$bad" ]; then
            echo "::error file=$index::entries with missing/empty id, name, path, or category: $bad"
            exit 1
          fi
          dupes=$(jq -r '.[].id' "$index" | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "::error file=$index::duplicate ids: $dupes"
            exit 1
          fi
          jq -r '.[].path' "$index" | while read -r path; do
            [ -f "$path" ] || {
              echo "::error file=$index::missing recipe file $path"
              exit 1
            }
          done
          # SKILL.md is the recipes catalog (listed in skills.json), not a chat
          # suggestion card — only *.md recipe cards must appear in index.json.
          for f in plugins/costory/skills/recipes/*.md; do
            [ "$(basename "$f")" = "SKILL.md" ] && continue
            jq -e --arg f "$f" 'any(.[]; .path == $f)' "$index" > /dev/null || {
              echo "::error file=$index::recipe file $f is not listed in index.json"
              exit 1
            }
          done

      - name: DatePreset tokens stay within query's authoritative enum
        run: |
          set -e
          # The 16-value DatePreset enum is a server contract; the server rejects any
          # other token with `-32602 Invalid option ... path: ["datePreset"]`.
          # query/SKILL.md is the authoritative source AND the only file allowed to
          # name invalid tokens (it lists counter-examples, e.g. "there is no
          # LAST_2_MONTHS, TRAILING_60_DAYS"). Every other skill/recipe must use only
          # valid tokens. Only the compound LAST_*/TRAILING_* forms are scanned —
          # those are the ones a model might invent a variant of (LAST_2_MONTHS);
          # MTD/QTD/YTD are atomic and carry no drift risk.
          canon=" TRAILING_3_DAYS TRAILING_7_DAYS TRAILING_30_DAYS TRAILING_45_DAYS TRAILING_90_DAYS TRAILING_14_WEEKS LAST_WEEK LAST_MONTH LAST_3_MONTHS LAST_6_MONTHS LAST_12_MONTHS LAST_4_YEARS LAST_INVOICE_MONTH MTD QTD YTD "
          violations=$(mktemp)
          for f in $(find plugins/costory/skills -name '*.md'); do
            [ "$f" = "plugins/costory/skills/query/SKILL.md" ] && continue
            for t in $(grep -hoE '\b(TRAILING|LAST)_[A-Z0-9_]+\b' "$f" | sort -u); do
              case "$canon" in
                *" $t "*) ;;
                *) echo "::error file=$f::'$t' is not in the DatePreset enum (16 values in query/SKILL.md); the server rejects unknown tokens with -32602 — use a valid preset or explicit from/to" >> "$violations" ;;
              esac
            done
          done
          if [ -s "$violations" ]; then cat "$violations"; exit 1; fi

      - name: Managed foundation blocks match their knowledge/ source
        run: |
          # Runtime-critical conventions are authored once under
          # knowledge/fragments/ and rendered inline into self-contained skills.
          # This fails the PR if a rendered block drifts from its source — run
          # scripts/render-foundation.py and commit to fix.
          python3 scripts/render-foundation.py --check

      - name: SKILL.md descriptions must be <= 1024 chars (Codex drops longer ones)
        run: |
          set -e
          fail=0
          for f in plugins/*/skills/*/SKILL.md; do
            len=$(awk -F'description: ' '/^description:/{print length($2); exit}' "$f")
            if [ "${len:-0}" -gt 1024 ]; then
              echo "::error file=$f::frontmatter description is $len chars; Codex's skill loader silently drops skills with descriptions > 1024"
              fail=1
            fi
          done
          exit $fail

      - name: Marketplace plugin sources must be subdirectories (Codex rejects "./")
        run: |
          set -e
          bad=$(jq -r '.plugins[] | select(.source == "./" or .source == ".") | .name' .claude-plugin/marketplace.json)
          if [ -n "$bad" ]; then
            echo "::error file=.claude-plugin/marketplace.json::plugin(s) [$bad] use source \"./\"; Codex rejects root-as-plugin entries — use ./plugins/<name>"
            exit 1
          fi

      - name: Reject stray {{SKILLS_DIR}} placeholders
        run: |
          if grep -rn '{{SKILLS_DIR}}' plugins/; then
            echo "::error::Found {{SKILLS_DIR}} in plugins/. This is the npx-skills install-time placeholder and is NOT substituted by Claude Code. Use \${CLAUDE_PLUGIN_ROOT}/skills/<skill-name>/... instead."
            exit 1
          fi

      - name: No top-level skills/ directory
        run: |
          if [ -d skills ]; then
            echo "::error::skills/ should be absent — move into plugins/costory/skills/"
            exit 1
          fi
